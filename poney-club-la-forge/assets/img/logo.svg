<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 340" role="img" aria-labelledby="logoTitle">
  <title id="logoTitle">Blason du Centre Équestre Poney Club de la Forge</title>
  <defs>
    <clipPath id="shieldClip">
      <path d="M34,18 L266,18 Q282,18 282,34 L282,205 Q282,332 150,334 Q18,332 18,205 L18,34 Q18,18 34,18 Z"/>
    </clipPath>
  </defs>

  <!-- Shield field -->
  <path id="shieldShape" d="M34,18 L266,18 Q282,18 282,34 L282,205 Q282,332 150,334 Q18,332 18,205 L18,34 Q18,18 34,18 Z"
        fill="#E7A81E"/>

  <g clip-path="url(#shieldClip)">
    <g transform="translate(46,44) scale(0.98)" stroke="#1B1E4D" fill="#1B1E4D" stroke-linecap="round" stroke-linejoin="round">

      <!-- hind leg, trailing (drawn first, sits behind) -->
      <path d="M78,168 C70,180 68,192 72,202 C75,208 80,210 86,210" stroke-width="18" fill="none"/>

      <!-- tail -->
      <path d="M58,145 C45,152 35,165 30,180" stroke-width="17" fill="none"/>
      <path d="M30,180 C26,195 28,212 38,225" stroke-width="9" fill="none"/>
      <path d="M32,192 L20,198 M34,202 L22,210 M38,212 L28,222" stroke-width="3" fill="none"/>

      <!-- hind leg, standing (weight bearing) -->
      <path d="M87,176 C80,196 82,211 90,223 C95,231 102,234 110,234" stroke-width="23" fill="none"/>

      <!-- body -->
      <ellipse cx="97" cy="160" rx="46" ry="31" transform="rotate(-33 97 160)"/>

      <!-- front leg, rear one (bent knee, pawing) -->
      <path d="M118,152 C122,130 118,110 108,95 C101,85 96,80 91,78" stroke-width="21" fill="none"/>

      <!-- front leg, forward one (raised highest) -->
      <path d="M108,150 C100,120 95,95 100,68 C103,55 112,48 123,45" stroke-width="21" fill="none"/>

      <!-- neck -->
      <path d="M120,135 C140,110 155,90 167,68" stroke-width="35" fill="none"/>

      <!-- mane, jagged crest along back of neck -->
      <path d="M154,60 L140,50 L131,64 L116,59 L109,77 L93,74 L91,94 L76,94 L81,114 L66,114 L76,129
               L96,140 L121,119 L136,94 L150,74 Z"/>

      <!-- head -->
      <path d="M150,52 L163,44 L162,25 L172,42 L179,22 L181,44 L206,80 L179,89 L156,71 Z"/>

      <!-- white sheen highlights -->
      <g stroke="#F6EFDC" stroke-width="4.5" fill="none" opacity="0.85">
        <path d="M129,127 C141,107 150,90 158,73"/>
        <path d="M81,146 C89,161 92,178 88,195"/>
        <path d="M104,140 C100,116 98,96 101,73"/>
      </g>
    </g>

    <!-- ground tufts -->
    <g stroke="#1B1E4D" stroke-width="4" stroke-linecap="round" fill="none">
      <path d="M118,278 C122,270 128,268 133,271"/>
      <path d="M138,282 C142,273 149,270 155,274"/>
      <path d="M96,280 C100,273 106,271 111,274"/>
      <path d="M162,280 C167,272 174,270 179,274"/>
    </g>
  </g>

  <!-- Shield outline -->
  <path d="M34,18 L266,18 Q282,18 282,34 L282,205 Q282,332 150,334 Q18,332 18,205 L18,34 Q18,18 34,18 Z"
        fill="none" stroke="#1B1E4D" stroke-width="5"/>
</svg>
